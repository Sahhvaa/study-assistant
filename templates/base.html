<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>{% block title %}Study Assistant{% endblock %} 📚</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">📚 Study Assistant</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            {% if session.get('entry_id') %}

            <a href="/summary" class="nav-link">Notes</a>
            <a href="/chat_page" class="nav-link">Ask AI</a>
            <a href="/flashcard_page" class="nav-link">Flashcards</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>📚 Study Assistant — powered by Groq AI</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
